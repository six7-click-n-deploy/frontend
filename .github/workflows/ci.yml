name: Frontend CI/CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ================================================================
  # 📐 TYPE CHECK
  # ================================================================
  typecheck:
    name: "📐 Type Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx vue-tsc -b --noEmit

  # ================================================================
  # 🧪 TEST
  # ================================================================
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate Shields.io endpoint badge
        if: always()
        run: |
          PCT=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
          COLOR=$(node -e "const p=$PCT; console.log(p>=80?'brightgreen':p>=70?'green':p>=50?'yellow':p>=30?'orange':'red')")
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > coverage/badge.json
          echo "Coverage: ${PCT}% (${COLOR})"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage
          retention-days: 14

  # ================================================================
  # 📊 COVERAGE — download report + publish to GitHub Pages
  # ================================================================
  # Downloads the coverage/ artifact produced by the test job and
  # (only on main) deploys it to GitHub Pages. On PRs the job still
  # runs and re-attaches the artifact so the green check is visible
  # — only the Pages-specific steps are skipped.
  #
  # The Pages source for this repo must be set to "GitHub Actions"
  # under Settings → Pages once. Until then, the deploy step fails
  # but the artifact is still produced by the test job.
  coverage:
    name: "📊 Coverage"
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-html
          path: coverage

      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v4

  # ================================================================
  # 🔒 SECURITY (deps + filesystem) — blocks on HIGH/CRITICAL
  # ================================================================
  # Runs in parallel with typecheck/test. Findings appear in the
  # GitHub Security tab via SARIF upload. Whitelist false positives
  # in `.trivyignore` (with a comment explaining why).
  security:
    name: "🔒 Security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, HIGH+)
        run: npm audit --audit-level=high --omit=dev

      # Trivy fs runs twice on purpose:
      #   1. blocking gate — fails the job on HIGH/CRITICAL
      #   2. SARIF emit — uploads ALL findings (incl. ignored ones)
      #      to the Security tab so they remain visible
      - name: Trivy filesystem scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

      - name: Trivy filesystem scan (SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy fs results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ================================================================
  # 🐳 BUILD — always runs, proves Dockerfile works
  # ================================================================
  build:
    name: "🐳 Build"
    runs-on: ubuntu-latest
    needs: [typecheck, test, security]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # 🔒 IMAGE SCAN — Trivy CVE scan against the built image
  # ================================================================
  # Builds a single-platform amd64 image with --load so the local
  # Docker daemon can hand it to Trivy. The build cache is shared
  # with the multi-platform `build` job (cache-from: type=gha) so
  # this is mostly a thin layer on top.
  image-scan:
    name: "🔒 Image Scan"
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image (amd64, --load)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: frontend:scan
          cache-from: type=gha

      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: frontend:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

      - name: Trivy image scan (SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: frontend:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-image.sarif

      - name: Upload Trivy image results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ================================================================
  # 📦 PUSH — only on main
  # ================================================================
  push:
    name: "📦 Push"
    runs-on: ubuntu-latest
    needs: [build, image-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # 🚀 TRIGGER STAGING DEPLOY
  # ================================================================
  trigger-staging:
    name: "🚀 Trigger Staging Deploy"
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger staging deployment
        run: |
          gh workflow run staging-deploy.yml \
            --repo six7-click-n-deploy/deployment \
            --ref main
        env:
          GH_TOKEN: ${{ secrets.DEPLOYMENT_PAT }}
