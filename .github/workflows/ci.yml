name: Frontend CI/CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ================================================================
  # 📐 TYPE CHECK
  # ================================================================
  typecheck:
    name: "📐 Type Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx vue-tsc -b --noEmit

  # ================================================================
  # 🧪 TEST
  # ================================================================
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # ================================================================
  # 🔒 SECURITY (deps + filesystem) — non-blocking during rollout
  # ================================================================
  # Runs in parallel with typecheck/test. Findings appear in the
  # GitHub Security tab via SARIF upload. Switch to blocking by
  # removing `continue-on-error` after the initial whitelist pass.
  security:
    name: "🔒 Security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, HIGH+)
        # `npm audit` exits non-zero on findings >= --audit-level. We
        # surface the report but don't fail the job yet — flip to
        # blocking by dropping `continue-on-error` once the backlog is
        # clean.
        continue-on-error: true
        run: npm audit --audit-level=high --omit=dev

      - name: Trivy filesystem scan (vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy fs results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ================================================================
  # 🐳 BUILD — always runs, proves Dockerfile works
  # ================================================================
  build:
    name: "🐳 Build"
    runs-on: ubuntu-latest
    needs: [typecheck, test, security]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # 🔒 IMAGE SCAN — Trivy CVE scan against the built image
  # ================================================================
  # Builds a single-platform amd64 image with --load so the local
  # Docker daemon can hand it to Trivy. The build cache is shared
  # with the multi-platform `build` job (cache-from: type=gha) so
  # this is mostly a thin layer on top.
  image-scan:
    name: "🔒 Image Scan"
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image (amd64, --load)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: frontend:scan
          cache-from: type=gha

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: frontend:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Upload Trivy image results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ================================================================
  # 📦 PUSH — only on main
  # ================================================================
  push:
    name: "📦 Push"
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # 🚀 TRIGGER STAGING DEPLOY
  # ================================================================
  trigger-staging:
    name: "🚀 Trigger Staging Deploy"
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger staging deployment
        run: |
          gh workflow run staging-deploy.yml \
            --repo six7-click-n-deploy/deployment \
            --ref main
        env:
          GH_TOKEN: ${{ secrets.DEPLOYMENT_PAT }}
